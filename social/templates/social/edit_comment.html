{% extends "social/base.html" %}

{% block content %}

<!-- Page heading -->
<h2 class="mb-3">Edit Comment</h2>

<!-- Bootstrap container to align form with site layout -->
<div class="container">
  <div class="row">
    <!-- Full-width column -->
    <div class="col-12 mt-3 mb-3">

      <!-- Form for editing an existing comment -->
      <form method="POST">
        {% csrf_token %}

        <!-- Render the form fields (textarea for comment body) with error messages -->
        {{ form.as_p }}

        <!-- Action buttons -->
        <div class="d-flex gap-2 align-items-center">
          <!-- Save changes button -->
          <button type="submit" class="btn btn-primary text-nowrap">Save changes</button>

          <!-- Cancel link returns user to the feed without saving -->
          <a href="{% url 'feed' %}">Cancel</a>
        </div>
      </form>

    </div>
  </div>
</div>

{% endblock %}
